```html
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oz Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#toggleMenu{
    position:absolute;
    top:15px;
    left:15px;
    z-index:9999;

    background:rgba(0,0,0,.7);
    color:#fff;

    border:none;
    border-radius:5px;

    padding:10px 15px;
    cursor:pointer;
}

#fullscreenBtn{

    position:absolute;
    top:15px;
    right:15px;
    z-index:9999;

    background:rgba(0,0,0,.7);
    color:#fff;

    border:none;
    border-radius:5px;

    padding:10px 15px;
    cursor:pointer;
}

.container{
    display:flex;
    width:100vw;
    height:100vh;
}

.sidebar{
    width:350px;
    background:#111;
    color:white;

    transition:.3s;

    overflow-y:auto;
    padding:15px;
}

.sidebar.hidden{
    width:0;
    padding:0;
    overflow:hidden;
}

.sidebar h2{
    margin-bottom:15px;
}

.sidebar input,
.sidebar select{

    width:100%;

    padding:10px;

    margin-bottom:8px;

    background:#222;
    color:white;

    border:none;
    border-radius:5px;
}

.sidebar button{

    width:100%;

    padding:12px;

    margin-bottom:10px;

    background:#6d28d9;

    color:white;

    border:none;
    border-radius:5px;

    cursor:pointer;
}

.sidebar button:hover{
    opacity:.9;
}

.source-editor{

    background:#1b1b1b;

    padding:10px;

    border-radius:5px;

    margin-bottom:12px;
}

.source-list{
    margin-top:15px;
}

.source-item{

    background:#222;

    padding:12px;

    margin-bottom:8px;

    border-radius:5px;

    cursor:pointer;
}

.source-item:hover{
    background:#333;
}

.source-item.active{

    background:#333;

    border-left:5px solid #00ff88;
}

.player-area{

    flex:1;

    background:black;

    position:relative;
}

video{

    width:100%;
    height:100%;

    object-fit:contain;

    background:black;
}

iframe{

    width:100%;
    height:100%;

    border:none;

    display:none;

    background:black;
}

</style>
</head>

<body>

<button id="toggleMenu" onclick="toggleMenu()">
☰ Fuentes
</button>

<div class="container">

<div class="sidebar">

<h2>Fuentes</h2>

<div id="sourceInputs"></div>

<button onclick="addSourceField()">
➕ Añadir Fuente
</button>

<button onclick="loadSources()">
▶ Cargar Fuentes
</button>

<div id="sources" class="source-list"></div>

</div>

<div class="player-area" id="playerArea">

<button id="fullscreenBtn">
⛶ Fullscreen
</button>

<video
id="video"
controls
autoplay>
</video>

<iframe
id="embedFrame"
allowfullscreen
webkitallowfullscreen
mozallowfullscreen
allow="fullscreen; autoplay">
</iframe>

</div>

</div>

<script>

const video=document.getElementById("video");
const iframe=document.getElementById("embedFrame");

let currentHls=null;
let sourceCount=0;
let loadedSources=[];

function toggleMenu(){

    document
        .querySelector(".sidebar")
        .classList
        .toggle("hidden");
}

function addSourceField(){

    sourceCount++;

    const div=document.createElement("div");

    div.className="source-editor";

    div.innerHTML=`

        <input
        class="source-name"
        placeholder="Nombre Fuente ${sourceCount}">

        <select class="source-type">

            <option value="hls">
                HLS / MP4
            </option>

            <option value="embed">
                EMBED / IFRAME
            </option>

        </select>

        <input
        class="source-url"
        placeholder="URL Fuente ${sourceCount}">

    `;

    document
        .getElementById("sourceInputs")
        .appendChild(div);
}

function loadSources(){

    loadedSources=[];

    document
    .querySelectorAll(".source-editor")
    .forEach((item,index)=>{

        const name=
            item.querySelector(".source-name").value.trim()
            || `Fuente ${index+1}`;

        const type=
            item.querySelector(".source-type").value;

        const url=
            item.querySelector(".source-url").value.trim();

        if(url){

            loadedSources.push({
                name,
                type,
                url
            });
        }
    });

    renderSourceMenu();

    if(loadedSources.length){

        selectSource(0);

        document
        .querySelector(".sidebar")
        .classList
        .add("hidden");
    }
}

function renderSourceMenu(){

    const container=
        document.getElementById("sources");

    container.innerHTML="";

    loadedSources.forEach((source,index)=>{

        const div=
            document.createElement("div");

        div.className=
            "source-item";

        div.innerHTML=
            source.name;

        div.onclick=()=>{

            document
            .querySelectorAll(".source-item")
            .forEach(x=>x.classList.remove("active"));

            div.classList.add("active");

            selectSource(index);
        };

        container.appendChild(div);
    });
}

function selectSource(index){

    const source=
        loadedSources[index];

    document
    .querySelectorAll(".source-item")
    .forEach(x=>x.classList.remove("active"));

    const active=
        document.querySelectorAll(".source-item")[index];

    if(active)
        active.classList.add("active");

    if(source.type==="embed"){

        if(currentHls){

            currentHls.destroy();
            currentHls=null;
        }

        video.pause();

        video.style.display="none";

        iframe.style.display="block";

        iframe.src=source.url;

        return;
    }

    iframe.style.display="none";
    iframe.src="";

    video.style.display="block";

    if(currentHls){

        currentHls.destroy();
        currentHls=null;
    }

    if(source.url.toLowerCase().includes(".m3u8")){

        if(Hls.isSupported()){

            currentHls=new Hls();

            currentHls.loadSource(source.url);

            currentHls.attachMedia(video);

            currentHls.on(
                Hls.Events.MANIFEST_PARSED,
                ()=>{
                    video.play();
                }
            );

        }else{

            video.src=source.url;
            video.play();
        }

    }else{

        video.src=source.url;
        video.play();
    }
}

function goFullscreen(){

    const playerArea =
        document.getElementById("playerArea");

    if(!document.fullscreenElement){

        playerArea.requestFullscreen();

    }else{

        document.exitFullscreen();
    }
}

video.addEventListener("dblclick",goFullscreen);

iframe.addEventListener("dblclick",goFullscreen);

document
.getElementById("fullscreenBtn")
.addEventListener("click",goFullscreen);

document.addEventListener("keydown",(e)=>{

    if(e.key.toLowerCase()==="f"){

        toggleMenu();
    }
});

addSourceField();
addSourceField();
addSourceField();

</script>

</body>
</html>
```
