<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Oz Player TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

#container{
    display:flex;
    width:100vw;
    height:100vh;
}

#sidebar{
    width:350px;
    background:#111;
    overflow-y:auto;
}

.channel{
    padding:15px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.channel.active{
    background:#0066ff;
}

#playerArea{
    flex:1;
    position:relative;
}

#fullscreenBtn{
    position:absolute;
    top:20px;
    left:20px;
    z-index:9999;
    width:50px;
    height:50px;
    border:none;
    border-radius:8px;
    background:#0066ff;
    color:white;
    font-size:24px;
    cursor:pointer;
}

video{
    width:100%;
    height:100%;
    background:black;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    display:none;
}

#infoBar{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:rgba(0,0,0,.8);
    padding:10px;
}

#sourcePanel{
    position:absolute;
    top:20px;
    right:20px;
    width:300px;
    background:rgba(0,0,0,.9);
    display:none;
}

.source{
    padding:10px;
    border-bottom:1px solid #444;
}

.source.active{
    background:#0066ff;
}
body.single-channel #sidebar{
    display:none;
}
</style>
</head>

<body>

<div id="container">

<div id="sidebar"></div>

<div id="playerArea">

    <button id="fullscreenBtn">⛶</button>

<video
    id="video"
    controls
    autoplay
    playsinline
    webkit-playsinline>
</video>

<iframe
    id="iframePlayer"
    allow="autoplay; fullscreen"
    allowfullscreen
    webkitallowfullscreen
    mozallowfullscreen>
</iframe>

<div id="sourcePanel"></div>

<div id="infoBar">
Canal: <span id="channelName">Ninguno</span>
</div>

</div>

</div>

<script>

const M3U = `

#EXTM3U

#EXTINF:-1 tvg-id="canal5",Canal 5
https://cdn.pontiscloud.com/output/COR/TSFH/playlist.m3u8
#EXTINF:-1 tvg-id="canal5",Canal 5
iframe:https://junkieembeds.pages.dev/embed/fox-sports-1
#EXTINF:-1 tvg-id="canal5",Canal 5
iframe:https://junkieembeds.pages.dev/embed/telemundo-usa
#EXTINF:-1 tvg-id="canal5",Canal 5
iframe:https://streamtpday1.xyz/global2.php?stream=dsports
#EXTINF:-1 tvg-id="canal5",Canal 5
iframe:https://streamtpday1.xyz/global2.php?stream=telemundousa
#EXTINF:-1 tvg-id="canal5",Canal 5
iframe:https://la18hd.com/vivo/canales.php?stream=telefe

`;

let channels={};
let channelList=[];
let selectedChannel=0;
let selectedSource=0;

const params = new URLSearchParams(window.location.search);
const tvgid = params.get('tvgid');


parseM3U();

if(tvgid){

    const index =
    channelList.findIndex(
        ch => ch.id === tvgid
    );

    if(index >= 0){
        selectedChannel = index;
    }

    document
    .getElementById('sidebar')
    .style.display = 'none';

}else{

    renderChannels();

}


function parseM3U(){

    const lines=M3U.split('\n');

    let current=null;

    for(let i=0;i<lines.length;i++){

        const line=lines[i].trim();

        if(line.startsWith('#EXTINF')){

            const tvgid=line.match(/tvg-id="([^"]+)"/);

            const name=line.split(',').pop();

            current={
                id:tvgid?tvgid[1]:name,
                name:name
            };

        }else if(
            line &&
            !line.startsWith('#')
        ){

            if(!channels[current.id]){

                channels[current.id]={
                    id:current.id,
                    name:current.name,
                    sources:[]
                };

            }

            channels[current.id]
            .sources
            .push(line);

        }

    }

    channelList=Object.values(channels);

}

function renderChannels(){

    const sidebar=document.getElementById('sidebar');

    sidebar.innerHTML='';

    channelList.forEach((ch,index)=>{

        const div=document.createElement('div');

        div.className='channel';

        if(index===selectedChannel)
            div.classList.add('active');

        div.innerText=ch.name;

        sidebar.appendChild(div);

    });

}

function playChannel(index){

    selectedChannel=index;

    selectedSource=0;

    renderChannels();

    showSources();

    playSource(0);

}

function showSources(){

    const panel=document.getElementById('sourcePanel');

    panel.style.display='block';

    const channel=channelList[selectedChannel];

    panel.innerHTML='';

    channel.sources.forEach((src,index)=>{

        const div=document.createElement('div');

        div.className='source';

        if(index===selectedSource)
            div.classList.add('active');

        div.innerText='Fuente '+(index+1);

        panel.appendChild(div);

    });

}


function toggleFullscreen(){

    const iframe =
        document.getElementById('iframePlayer');

    const video =
        document.getElementById('video');

    const target =
        iframe.style.display === 'block'
        ? iframe
        : video;

    if(document.fullscreenElement){

        document.exitFullscreen();

    }else{

        target.requestFullscreen?.();

    }
}

document
.getElementById('fullscreenBtn')
.addEventListener(
    'click',
    toggleFullscreen
);

function playSource(index){

    selectedSource=index;

    showSources();

    const channel=channelList[selectedChannel];

    const source=channel.sources[index];

    document.getElementById(
        'channelName'
    ).innerText=channel.name;

    const video=
    document.getElementById('video');

    const iframe=
    document.getElementById('iframePlayer');

    video.style.display='block';
    iframe.style.display='none';

if(source.startsWith('iframe:')){

    video.pause();

    video.style.display='none';

    iframe.style.display='block';

    let url =
        source.replace('iframe:','');

    iframe.allow =
        'autoplay; fullscreen';

    iframe.src = url;

    return;
}

    if(source.endsWith('.mpd')){

        const player=
        dashjs.MediaPlayer().create();

        player.initialize(
            video,
            source,
            true
        );

        return;

    }

    if(Hls.isSupported()){

        const hls=new Hls();

        hls.loadSource(source);

        hls.attachMedia(video);

    }else{

        video.src=source;

    }

}

document.addEventListener(
'keydown',
e=>{

    switch(e.keyCode){

        case 38:

            if(selectedChannel>0){

                selectedChannel--;

                renderChannels();

            }

        break;

        case 77: // M

    const video =
    document.getElementById('video');

    video.muted = !video.muted;

        break;

        case 80: // P

    if(video.paused){

        video.play();

    }else{

        video.pause();

    }

    break;


        case 40:

            if(
                selectedChannel<
                channelList.length-1
            ){

                selectedChannel++;

                renderChannels();

            }

        break;

        case 13:

            playChannel(
                selectedChannel
            );

        break;

        case 39:

            const channel=
            channelList[selectedChannel];

            if(
                selectedSource<
                channel.sources.length-1
            ){

                selectedSource++;

                playSource(
                    selectedSource
                );

            }

        break;

        case 70:

    toggleFullscreen();

        break;

        case 37:

            if(selectedSource>0){

                selectedSource--;

                playSource(
                    selectedSource
                );

            }

        break;

    }

});

if(channelList.length){

    if(tvgid){

        playChannel(
            selectedChannel
        );

    }else{

        playChannel(0);

    }

}   

</script>

</body>
</html>
